<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robert veille sur vous</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f7f5f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      padding: 2rem;
    }
    img {
      max-width: 100%;
      max-height: 80vh;
      display: block;
    }
    a {
      display: inline-block;
      margin-top: 2rem;
      color: #2a2a2a;
      font-size: 1rem;
      text-decoration: none;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.5; }
  </style>
</head>
<body>
  <img src="Robert.jpg" alt="Robert">
  <a href="https://qbc.fr" target="_blank" rel="noopener">Pour gazouiller gaiement</a>
</body>
</html>
